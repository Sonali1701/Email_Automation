# Render Blueprint: web service + Postgres + a daily follow-up cron.
# Deploy: push this repo to GitHub, then in Render -> New -> Blueprint, point at it.
# Fill the `sync: false` secrets in the Render dashboard after the first deploy.

databases:
  - name: radixsol-outreach-db
    plan: free

services:
  # The web UI (upload, preview, send, reports, Microsoft sign-in).
  - type: web
    name: radixsol-email
    runtime: python
    plan: starter            # a non-sleeping instance; free tier sleeps
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --worker-class gthread --threads 4 --timeout 600 --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: radixsol-outreach-db
          property: connectionString
      - key: GRAPH_CLIENT_ID
        sync: false
      - key: GRAPH_TENANT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: "claude-haiku-4-5-20251001"
      - key: FOLLOWUP_INTERVALS
        value: "2,5,7,10,20"
      - key: BODY_TYPE
        value: "Text"
      - key: APP_PASSWORD          # protects the public URL (HTTP basic auth)
        sync: false

  # Runs the follow-up engine once a day (UTC). Detects replies, sends due bumps.
  - type: cron
    name: radixsol-followups
    runtime: python
    schedule: "0 9 * * *"         # 09:00 UTC daily (= 14:30 IST)
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python followups.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: radixsol-outreach-db
          property: connectionString
      - key: GRAPH_CLIENT_ID
        sync: false
      - key: GRAPH_TENANT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: "claude-haiku-4-5-20251001"
      - key: FOLLOWUP_INTERVALS
        value: "2,5,7,10,20"
      - key: BODY_TYPE
        value: "Text"
